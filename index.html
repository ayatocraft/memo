<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Secure Login</title>

<style>
body{
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  width:340px;
  background:#111827;
  padding:24px;
  border-radius:16px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

button{
  width:100%;
  padding:14px;
  font-size:16px;
  background:#2563eb;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

.spinner{
  margin:15px auto;
  width:24px;
  height:24px;
  border:3px solid #334155;
  border-top:3px solid #3b82f6;
  border-radius:50%;
  animation:spin 1s linear infinite;
  display:none;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

#bar{
  width:100%;
  height:8px;
  background:#1f2937;
  border-radius:10px;
  overflow:hidden;
  margin-top:12px;
}

#progress{
  width:0%;
  height:100%;
  background:#22c55e;
  transition:0.3s;
}

#status{
  margin-top:10px;
  font-size:13px;
  color:#cbd5e1;
}

#check{
  font-size:40px;
  margin-top:10px;
  display:none;
  transform:scale(0);
  transition:0.2s;
}
</style>
</head>

<body>

<div class="card">
  <h2>認証</h2>

  <button id="authBtn">認証する</button>

  <div class="spinner" id="spinner"></div>

  <div id="status">待機中</div>

  <div id="bar"><div id="progress"></div></div>

  <div id="check">☑️</div>
</div>

<script src="auth.js"></script>

</body>
</html>
