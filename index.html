<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>認証</title>

<style>
body{
  font-family:sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
  padding-top:120px;
}

.card{
  width:320px;
  margin:auto;
  background:#111827;
  padding:30px;
  border-radius:16px;
}

button{
  width:100%;
  padding:14px;
  font-size:18px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:10px;
}

.spinner{
  width:24px;
  height:24px;
  border:3px solid #334155;
  border-top:3px solid #3b82f6;
  border-radius:50%;
  margin:15px auto;
  animation:spin 1s linear infinite;
  display:none;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

#bar{
  width:100%;
  height:8px;
  background:#1f2937;
  border-radius:10px;
  margin-top:15px;
  overflow:hidden;
}

#progress{
  width:0%;
  height:100%;
  background:#22c55e;
  transition:0.3s;
}

#status{
  margin-top:12px;
  font-size:14px;
  color:#cbd5e1;
}
</style>
</head>

<body>

<div class="card">
  <h2>アプリ認証</h2>

  <button onclick="startAuth()">認証する</button>

  <div class="spinner" id="spinner"></div>

  <div id="status">待機中</div>

  <div id="bar">
    <div id="progress"></div>
  </div>
</div>

<script src="auth.js"></script>

</body>
</html>
