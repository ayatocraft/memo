<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>認証</title>

<style>
body{
  font-family: -apple-system, sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
  padding-top:120px;
}

.card{
  background:#111827;
  width:320px;
  margin:auto;
  padding:30px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

button{
  width:100%;
  padding:14px;
  font-size:18px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

button:active{
  transform:scale(0.98);
}

#status{
  margin-top:20px;
  font-size:14px;
  color:#cbd5e1;
  min-height:20px;
}

.spinner{
  margin:15px auto;
  width:24px;
  height:24px;
  border:3px solid #334155;
  border-top:3px solid #3b82f6;
  border-radius:50%;
  animation:spin 1s linear infinite;
  display:none;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}
</style>
</head>

<body>

<div class="card">
  <h2>アプリ認証</h2>
  <p>続行するには認証してください</p>

  <button id="authBtn">認証する</button>

  <div class="spinner" id="spinner"></div>

  <div id="status"></div>
</div>

<script src="auth.js"></script>

</body>
</html>
