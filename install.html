<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA インストールアシスタント</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ayatocraft/memo@main/style.css">

    <link rel="manifest" href="manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PWA アシスタント">
    
    <style>
        /* (前回と同じスタイルのため省略) */
        .assistant-container {
            padding: 20px;
            background-color: var(--color-bg-secondary); 
            border-radius: 8px;
            max-width: 600px;
            margin: 0 auto;
        }
        .assistant-container .backup-btn {
            margin-top: 15px;
            width: 100%;
        }
        .instructions {
            background-color: var(--color-bg);
            border: 1px solid var(--color-border);
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            text-align: left;
        }
        .instructions p { margin-bottom: 10px; }
        .instructions code {
            background-color: var(--color-bg-tertiary);
            padding: 2px 5px;
            border-radius: 3px;
        }
        .cancel-btn {
            background-color: #6c757d;
            border-color: #6c757d;
        }
        .cancel-btn:hover { background-color: #5a6268; }
        .install-btn {
             background-color: #28a745; 
             border-color: #28a745;
        }
        .install-btn:hover { background-color: #218838; }
        .install-btn:disabled {
            background-color: #ccc;
            border-color: #ccc;
            cursor: not-allowed;
            color: #666;
        }
        #message {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">

    <aside class="sidebar">
        <h2>Memo</h2>
        <nav>
            <a href="index.html" class="backup-btn" style="text-decoration: none; margin-top: 20px; display: block; text-align: center;">
                🏠 ホームに戻る
            </a>
        </nav>
    </aside>

    <main class="content">
        <div class="assistant-container">
            <h1 id="assistantTitle" style="text-align: center;">PWA アシスタント</h1>
            <p id="assistantMessage" style="text-align: center;">状態を確認しています...</p>
            <div id="buttonContainer"></div>
            <button id="cancelBtn" class="backup-btn cancel-btn" style="margin-top: 20px; width: 100%;">キャンセル (ホームに戻る)</button>
            <p id="message" style="display:none; text-align: center;"></p>
        </div>
    </main>
</div>


<script>
document.addEventListener('DOMContentLoaded', () => {
    const buttonContainer = document.getElementById('buttonContainer');
    const messageEl = document.getElementById('message');
    const titleEl = document.getElementById('assistantTitle');
    const msgEl = document.getElementById('assistantMessage');
    let installPromptEvent = null;

    // Service Worker 登録
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
        .then(() => console.log('Service Worker registered'))
        .catch(err => console.log('Service Worker registration failed:', err));
    }

    // PWAインストール済みかチェック
    // ▼▼▼ 修正箇所 ▼▼▼
    // 「ブラウザモードで"ない"」場合をインストール済みと判定する
    const isPwaInstalled = !window.matchMedia('(display-mode: browser)').matches || window.navigator.standalone;
    // ▲▲▲ 修正ここまで ▲▲▲

    // --- 関数定義 (showUninstallUI, showInstallUI) ---
    // (中身は前回と同一のため、変更なし)

    function showUninstallUI() {
        titleEl.textContent = 'PWAをアンインストール';
        msgEl.innerHTML = 'アプリはインストール済みです。<br>アンインストールはブラウザまたはOSの設定から手動で行う必要があります。';
        buttonContainer.innerHTML = '';

        const infoDiv = document.createElement('div');
        infoDiv.className = 'instructions'; 
        infoDiv.innerHTML = `
            <p><strong>一般的なアンインストール手順:</strong></p>
            <p><strong>PC (Chrome) の場合:</strong><br>
            1. アドレスバーに <code>chrome://apps</code> と入力<br>
            2. 「Memo」を右クリック<br>
            3. 「Chrome から削除」を選択</p>
            <p><strong>スマートフォンの場合:</strong><B<br>
            ホーム画面のアプリアイコンを長押しし、「アンインストール」または「アプリを削除」を選択してください。</p>
        `;
        buttonContainer.appendChild(infoDiv);

        const uninstallBtn = document.createElement('button');
        uninstallBtn.textContent = '手順を理解しました (ホームに戻る)';
        uninstallBtn.className = 'backup-btn'; 
        uninstallBtn.addEventListener('click', () => window.location.href='home.html');
        buttonContainer.appendChild(uninstallBtn);

        const originalCancelBtn = document.getElementById('cancelBtn');
        if (originalCancelBtn) {
            originalCancelBtn.style.display = 'none';
        }
    }

    function showInstallUI() {
        titleEl.textContent = 'PWAをインストール';
        buttonContainer.innerHTML = '';

        const installBtn = document.createElement('button');
        installBtn.id = 'installActionBtn';
        installBtn.textContent = 'インストール';
        installBtn.className = 'backup-btn install-btn'; 
        installBtn.disabled = true; 
        msgEl.textContent = 'インストールの準備をしています... (プロンプト待機中)';

        installBtn.addEventListener('click', async () => {
            if (!installPromptEvent) return;

            installBtn.disabled = true;
            installPromptEvent.prompt();

            const { outcome } = await installPromptEvent.userChoice;
            if (outcome === 'accepted') {
                messageEl.textContent = 'インストールが完了しました。ホームに戻ります。';
                const originalCancelBtn = document.getElementById('cancelBtn');
                if (originalCancelBtn) originalCancelBtn.style.display = 'none';
                
                setTimeout(() => window.location.href='home.html', 2000);
            } else {
                messageEl.textContent = 'インストールがキャンセルされました。';
                installBtn.disabled = false;
            }
            installPromptEvent = null;
            messageEl.style.display = 'block';
        });

        buttonContainer.appendChild(installBtn);
    }

    // --- メイン処理 (変更なし) ---
    if (isPwaInstalled) {
        showUninstallUI();
    } else {
        showInstallUI();

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            installPromptEvent = e;
            const installBtn = document.getElementById('installActionBtn');
            if (installBtn) {
                installBtn.disabled = false;
                msgEl.textContent = '準備ができました。下のボタンを押してインストールしてください。';
            }
        });

        setTimeout(() => {
            if (!installPromptEvent && !isPwaInstalled) {
                const installBtn = document.getElementById('installActionBtn');
                if (installBtn && installBtn.disabled) {
                    msgEl.textContent = 'PWAインストールに対応していないか、すでにインストールされている可能性があります。アプリ一覧をご覧ください。';
                    installBtn.textContent = '利用不可';
                }
            }
        }, 3000);
    }

    // キャンセルボタンのイベントリスナー (変更なし)
    document.getElementById('cancelBtn').addEventListener('click', () => window.location.href='home.html');
});
</script>

</body>
</html>
